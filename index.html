<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひとりごと</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #FDF8F4;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #7e7e7e;
            --border-color: #E2E9F3;
            --color-lime: #D2E767;
            --color-mango: #FFA26D;
            --color-avatar-bg: #C0E0FF;
            --color-gemini: #1A73E8; 
            --color-claude: #D97756; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; padding-bottom: 80px;
        }
        .header {
            font-family: 'Noto Serif JP', serif;
            font-weight: 700;
            position: sticky; top: 0;
            background: rgba(253, 248, 244, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--color-mango);
            padding: 16px; text-align: center; font-size: 20px; color: #4a4a4a; z-index: 100; letter-spacing: 3px;
        }
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 14px; }
        
        .post-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 12px rgba(129, 165, 222, 0.08); }
        .post-box textarea { width: 100%; height: 100px; background: transparent; border: none; color: var(--text-color); font-size: 16px; resize: none; font-family: 'Noto Sans JP', sans-serif; line-height: 1.6; }
        .post-box textarea:focus { outline: none; }
        
        .post-btn-container { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #f5f5f5; padding-top: 12px; margin-top: 5px; }
        .btn-base { font-family: inherit; border: none; border-radius: 20px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; }
        .draft-btn { background-color: #e9ecef; color: #495057; }
        .post-btn { background-color: var(--color-mango); color: white; }
        
        .draft-container { display: none; background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 14px; padding: 12px; margin-bottom: 16px; }
        .draft-item { font-size: 14px; color: #333; background: white; padding: 10px; border-radius: 8px; border: 1px solid #dee2e6; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .post { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 16px; margin-bottom: 16px; }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; background-color: var(--color-avatar-bg); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--border-color); }
        .post-content { font-family: 'Noto Serif JP', serif; font-size: 16px; line-height: 1.75; white-space: pre-wrap; margin-bottom: 14px; }
        
        .action-group { display: flex; gap: 10px; margin-bottom: 12px; border-top: 1px solid #f8f8f8; padding-top: 12px; }
        .action-btn { flex: 1; border: none; padding: 10px; border-radius: 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .btn-gemini { background: var(--color-gemini); color: white; }
        .btn-claude { background: var(--color-claude); color: white; }

        .comment-style-toggle { font-size: 13px; color: #6d7a1c; background: #f4f6ec; border: none; border-radius: 12px; padding: 6px 12px; cursor: pointer; font-weight: 700; }
        .correction-box { display: none; background-color: #fafbfc; border-left: 4px solid var(--color-lime); padding: 12px; margin-top: 6px; }
        
        .footer-manage { margin-top: 40px; border-top: 1px dashed #ced4da; padding-top: 20px; text-align: center; }
        .backup-btn { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px; font-size: 11px; cursor: pointer; margin: 4px; }
    </style>
</head>
<body>

<div class="header">ひとりごと</div>

<div class="container">
    <div id="draftArea" class="draft-container">
        <div style="font-size: 12px; font-weight: 700; color: #6c757d; margin-bottom: 6px;">下書き</div>
        <div id="draftContent" class="draft-item" onclick="loadDraft()"></div>
    </div>

    <div class="post-box">
        <textarea id="postInput" placeholder="今日の日記を書きましょう..." oninput="autoSaveDraft()"></textarea>
        <div id="weatherDisplay" style="font-size: 12px; color: #7e7e7e; margin-bottom: 10px;">天気情報を取得中...</div>
        <div class="post-btn-container">
            <button class="btn-base draft-btn" onclick="manualSaveDraft()">下書き保存</button>
            <button class="btn-base post-btn" onclick="addPost()">投稿する</button>
        </div>
    </div>

    <div id="postFeed" class="feed"></div>

    <div class="footer-manage">
        <button class="backup-toggle" onclick="document.getElementById('backupMenu').style.display='flex'">データ管理</button>
        <div id="backupMenu" style="display:none; flex-direction:column; gap:8px; margin-top:10px;">
            <button class="backup-btn" onclick="exportJSON()">備份日記 (JSON)</button>
            <button class="backup-btn" onclick="document.getElementById('importFile').click()">還原日記 (JSON)</button>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(this)">
            <button class="backup-btn" onclick="exportCSV()">導出為 Excel/CSV</button>
        </div>
    </div>
</div>

<script>
    const USER_NAME = "リカ"; const USER_AVATAR = "🌷"; 
    
    document.addEventListener("DOMContentLoaded", () => { renderPosts(); checkDraft(); getLocation(); });

    function autoSaveDraft() { localStorage.setItem("jp_diary_draft", document.getElementById("postInput").value); }
    function manualSaveDraft() { alert("草稿已儲存！"); }
    function checkDraft() {
        const d = localStorage.getItem("jp_diary_draft");
        if (d) { document.getElementById("draftArea").style.display = "block"; document.getElementById("draftContent").innerText = d.substring(0, 20); }
    }
    function loadDraft() { document.getElementById("postInput").value = localStorage.getItem("jp_diary_draft"); }

    function addPost() {
        const content = document.getElementById("postInput").value.trim();
        if (!content) return;
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts") || "[]");
        posts.unshift({ id: Date.now(), content: content, time: new Date().toLocaleString(), correction: "" });
        localStorage.setItem("jp_sns_posts", JSON.stringify(posts));
        document.getElementById("postInput").value = "";
        localStorage.removeItem("jp_diary_draft");
        renderPosts();
    }

    function renderPosts() {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts") || "[]");
        const feed = document.getElementById("postFeed");
        feed.innerHTML = "";
        posts.forEach(p => {
            const div = document.createElement("div");
            div.className = "post";
            div.innerHTML = `
                <div class="post-header"><div class="avatar"><span>${USER_AVATAR}</span></div><div><div class="username">${USER_NAME}</div><div style="font-size:11px;color:#7e7e7e">${p.time}</div></div></div>
                <div class="post-content">${p.content.replace(/\n/g, '<br>')}</div>
                <div class="action-group">
                    <button class="action-btn btn-gemini" onclick="goToAI('gemini', \`${encodeURIComponent(p.content)}\`)">Gemini 添削</button>
                    <button class="action-btn btn-claude" onclick="goToAI('claude', \`${encodeURIComponent(p.content)}\`)">Claude 添削</button>
                </div>
                <button id="btn-${p.id}" class="comment-style-toggle" onclick="toggleCorr(${p.id})">添削・学習メモ</button>
                <div id="box-${p.id}" class="correction-box"><div style="font-weight:700;font-size:12px;margin-bottom:6px;">添削メモ</div><div contenteditable="true" onblur="saveCorr(${p.id}, this.innerText)">${p.correction || ""}</div></div>
            `;
            feed.appendChild(div);
        });
    }

    function toggleCorr(id) {
        const box = document.getElementById('box-'+id);
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    function goToAI(type, text) {
        const t = `請批改以下日文日記：\n${decodeURIComponent(text)}`;
        if (type === 'gemini') window.open(`https://gemini.google.com/app?prompt=${encodeURIComponent(t)}`, '_blank');
        else window.open(`https://claude.ai/new?q=${encodeURIComponent(t)}`, '_blank');
    }

    function saveCorr(id, text) {
        let p = JSON.parse(localStorage.getItem("jp_sns_posts"));
        p.find(x => x.id == id).correction = text;
        localStorage.setItem("jp_sns_posts", JSON.stringify(p));
    }
</script>
</body>
</html>
