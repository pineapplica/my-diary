<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひとりごと</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #FDF8F4;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #7e7e7e;
            --border-color: #E2E9F3;
            
            --color-lime: #D2E767;
            --color-mango: #FFA26D;
            --color-avatar-bg: #C0E0FF;
            
            --color-gemini: #1A73E8; 
            --color-claude: #D97756; 
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }
        .header {
            font-family: 'Noto Serif JP', "Hiragino Mincho ProN", "MS Mincho", serif;
            font-weight: 700;
            position: sticky;
            top: 0;
            background: rgba(253, 248, 244, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--color-mango);
            padding: 16px;
            text-align: center;
            font-size: 20px;
            color: #4a4a4a;
            z-index: 100;
            letter-spacing: 3px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 14px;
        }
        
        /* 發文區 */
        .post-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(129, 165, 222, 0.08);
        }
        .post-box textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            resize: none;
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 1.6;
        }
        .post-box textarea:focus {
            outline: none;
        }
        .post-box textarea::placeholder {
            color: #ccc;
        }
        
        .weather-status {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 2px;
        }
        
        .post-btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid #f5f5f5;
            padding-top: 12px;
            margin-top: 5px;
        }
        .btn-base {
            font-family: inherit;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .draft-btn {
            background-color: #e9ecef;
            color: #495057;
        }
        .post-btn {
            background-color: var(--color-mango);
            color: white;
            box-shadow: 0 2px 6px rgba(255, 162, 109, 0.4);
        }
        .btn-base:active {
            opacity: 0.8;
        }

        /* 草稿顯示區 */
        .draft-container {
            display: none;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .draft-title {
            font-size: 12px;
            font-weight: 700;
            color: #6c757d;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .draft-item {
            font-size: 14px;
            color: #333;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            cursor: pointer;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .draft-clear {
            color: #ff5c5c;
            font-size: 11px;
            padding: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* 動態牆 */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .post {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 4px 12px rgba(129, 165, 222, 0.05);
        }
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: var(--color-avatar-bg);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; 
            border: 1px solid var(--border-color);
        }

        .post-info {
            display: flex;
            flex-direction: column;
        }
        .username {
            font-weight: 700;
            font-size: 15px;
            color: #444;
            letter-spacing: 0.5px;
        }
        .meta-info {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            gap: 8px;
        }
        .post-content {
            font-family: 'Noto Serif JP', "Hiragino Mincho ProN", "MS Mincho", serif;
            font-size: 16px;
            line-height: 1.75;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 14px;
            color: #2c2c2c;
            padding: 0 2px;
            letter-spacing: 0.8px;
        }
        
        .action-group {
            display: flex;
            gap: 10px; 
            flex-wrap: wrap;
            margin-bottom: 12px;
            border-top: 1px solid #f8f8f8;
            padding-top: 12px;
        }
        .action-btn {
            font-family: inherit;
            flex: 1;
            min-width: 120px;
            border: none;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 12px; 
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:active {
            opacity: 0.8;
        }
        .btn-gemini {
            background: var(--color-gemini);
            color: white;
        }
        .btn-claude {
            background: var(--color-claude);
            color: white;
        }

        /* 留言回覆感摺疊區塊 */
        .comment-style-toggle {
            font-size: 13px;
            color: #6d7a1c;
            background: #f4f6ec;
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
        }
        .comment-style-toggle:active {
            background: #e9edd3;
        }
        .correction-box {
            display: none; 
            background-color: #fafbfc;
            border-left: 4px solid var(--color-lime);
            padding: 12px 14px;
            border-radius: 0 14px 14px 0;
            border-top: 1px solid #f0f2f5;
            border-right: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
            margin-top: 6px;
            margin-bottom: 4px;
        }
        .correction-title {
            font-weight: 700;
            color: #6d7a1c;
            font-size: 12px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .correction-content {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            white-space: pre-wrap;
            min-height: 24px;
        }
        .correction-content[placeholder]:empty:before {
            content: attr(placeholder);
            color: #b0b0b0;
            font-style: italic;
        }
        .delete-btn {
            font-family: inherit;
            background: none;
            border: none;
            color: #ff5c5c;
            cursor: pointer;
            font-size: 11px;
            padding: 0;
            margin-top: 8px;
            margin-left: 4px;
            opacity: 0.6;
            font-weight: 500;
        }

        /* 頁尾資料管理區 */
        .footer-manage {
            margin-top: 40px;
            border-top: 1px dashed #ced4da;
            padding-top: 20px;
            text-align: center;
        }
        .backup-toggle {
            font-size: 12px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .backup-menu {
            display: none;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            margin-top: 10px;
            gap: 8px;
            flex-direction: column;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .backup-menu-row {
            display: flex;
            gap: 8px;
        }
        .backup-btn {
            font-family: inherit;
            flex: 1;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 8px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            color: #495057;
        }
    </style>
</head>
<body>

<div class="header">ひとりごと</div>

<div class="container">
    <div id="draftArea" class="draft-container">
        <div class="draft-title">下書き（草稿）</div>
        <div style="display:flex; gap:8px; align-items:center;">
            <div id="draftContent" class="draft-item" onclick="loadDraft()" style="flex:1;"></div>
            <button class="draft-clear" onclick="clearDraft()">削除</button>
        </div>
    </div>

    <div class="post-box">
        <textarea id="postInput" placeholder="今日の日記を日本語で書いてみましょう！..." oninput="autoSaveDraft()"></textarea>
        <div id="weatherDisplay" class="weather-status">位置情報と天気を取得中...</div>
        <div class="post-btn-container">
            <button class="btn-base draft-btn" onclick="manualSaveDraft()">下書き保存</button>
            <button class="btn-base post-btn" onclick="addPost()">投稿する</button>
        </div>
    </div>

    <div id="postFeed" class="feed"></div>

    <div class="footer-manage">
        <button class="backup-toggle" onclick="toggleBackupMenu()">データ管理</button>
        <div id="backupMenu" class="backup-menu">
            <div class="backup-menu-row">
                <button class="backup-btn" onclick="exportJSON()">備份日記 (匯出 JSON 檔)</button>
                <label class="backup-btn" style="display: flex; align-items: center; justify-content: center; margin:0;">
                    還原日記 (匯入 JSON 檔)
                    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(this)">
                </label>
            </div>
            <div class="backup-menu-row">
                <button class="backup-btn" onclick="exportCSV()">導出為 Excel/CSV 表格</button>
            </div>
        </div>
    </div>
</div>

<script>
    const USER_NAME = "リカ"; 
    const USER_AVATAR = "🌷"; 

    let currentWeatherData = "天気情報なし";

    document.addEventListener("DOMContentLoaded", () => {
        loadPosts();
        checkDraft();
        getLiveWeatherAndLocation();
    });

    /* 草稿系統功能 */
    function autoSaveDraft() {
        const content = document.getElementById("postInput").value;
        if(content.trim() !== "") {
            localStorage.setItem("jp_diary_draft", content);
        } else {
            localStorage.removeItem("jp_diary_draft");
        }
    }

    function manualSaveDraft() {
        const content = document.getElementById("postInput").value.trim();
        if (!content) {
            alert("請輸入內容後再存為草稿。");
            return;
        }
        localStorage.setItem("jp_diary_draft", content);
        checkDraft();
        alert("草稿已儲存！");
    }

    function checkDraft() {
        const draft = localStorage.getItem("jp_diary_draft");
        const draftArea = document.getElementById("draftArea");
        if (draft && draft.trim() !== "") {
            draftArea.style.display = "block";
            document.getElementById("draftContent").innerText = draft.length > 25 ? draft.substring(0, 25) + "..." : draft;
        } else {
            draftArea.style.display = "none";
        }
    }

    function loadDraft() {
        const draft = localStorage.getItem("jp_diary_draft");
        if (draft) {
            document.getElementById("postInput").value = draft;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function clearDraft() {
        if(confirm("確定要刪除這則草稿嗎？")) {
            localStorage.removeItem("jp_diary_draft");
            document.getElementById("postInput").value = "";
            checkDraft();
        }
    }

    /* 摺疊切換功能 */
    function toggleCorrection(postId) {
        const box = document.getElementById(`box-${postId}`);
        const btn = document.getElementById(`btn-${postId}`);
        if (box.style.display === "block") {
            box.style.display = "none";
            btn.innerText = "添削・学習メモ";
        } else {
            box.style.display = "block";
            btn.innerText = "折りたたむ (收起)";
        }
    }

    function toggleBackupMenu() {
        const menu = document.getElementById("backupMenu");
        menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
    }

    function getLiveWeatherAndLocation() {
        if (!navigator.geolocation) {
            document.getElementById("weatherDisplay").innerText = "位置情報非対応";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            try {
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const weatherData = await weatherRes.json();
                const temp = Math.round(weatherData.current_weather.temperature);
                const weatherCode = weatherData.current_weather.weathercode;
                const weatherText = translateWeatherCode(weatherCode);

                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`);
                const geoData = await geoRes.json();
                
                const address = geoData.address;
                const locationName = address.city || address.town || address.suburb || address.state || "現在地";

                currentWeatherData = `${weatherText} ${temp}°C / ${locationName}`;
                document.getElementById("weatherDisplay").innerText = currentWeatherData;

            } catch (error) {
                console.error(error);
                document.getElementById("weatherDisplay").innerText = "データの取得に失敗しました";
            }
        }, () => {
            document.getElementById("weatherDisplay").innerText = "位置情報の許可が必要です";
        });
    }

    function translateWeatherCode(code) {
        if (code === 0) return "晴れ";
        if ([1, 2, 3].includes(code)) return "晴れのちくもり";
        if ([45, 48].includes(code)) return "霧";
        if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "雨";
        if ([71, 73, 75, 77, 85, 86].includes(code)) return "雪";
        if ([95, 96, 99].includes(code)) return "雷雨";
        return "くもり";
    }

    function addPost() {
        const content = document.getElementById("postInput").value.trim();
        if (!content) return;

        const now = new Date();
        const timestamp = `${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        const post = {
            id: Date.now(),
            time: timestamp,
            weather: currentWeatherData, 
            content: content,
            correction: ""
        };

        let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        posts.unshift(post);
        localStorage.setItem("jp_sns_posts", JSON.stringify(posts));

        localStorage.removeItem("jp_diary_draft");
        document.getElementById("postInput").value = "";
        checkDraft();
        renderPosts();
    }

    function renderPosts() {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        const feed = document.getElementById("postFeed");
        feed.innerHTML = "";

        posts.forEach(post => {
            const postEl = document.createElement("div");
            postEl.className = "post";
            
            const promptText = `請幫我批改這段日文日記。請指出不自然的地方、文法錯誤，並提供修正建議與更道地的表達方式：\n\n「${post.content}」`;
            const weatherString = post.weather ? `<span>${escapeHtml(post.weather)}</span>` : "";

            postEl.innerHTML = `
                <div class="post-header">
                    <div class="avatar">
                        <span>${escapeHtml(USER_AVATAR)}</span>
                    </div>
                    <div class="post-info">
                        <span class="username">${escapeHtml(USER_NAME)}</span>
                        <div class="meta-info">
                            <span>${post.time}</span>
                            ${weatherString}
                        </div>
                    </div>
                </div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                
                <div class="action-group">
                    <button class="action-btn btn-gemini" onclick="goToAI('gemini', \`${encodeURIComponent(promptText)}\`)">自然な表現に (Gemini)</button>
                    <button class="action-btn btn-claude" onclick="goToAI('claude', \`${encodeURIComponent(promptText)}\`)">自然な表現に (Claude)</button>
                </div>

                <button id="btn-${post.id}" class="comment-style-toggle" onclick="toggleCorrection(${post.id})">添削・学習メモ</button>

                <div id="box-${post.id}" class="correction-box">
                    <div class="correction-title">添削・学習メモ</div>
                    <div class="correction-content" contenteditable="true" onblur="saveCorrection(${post.id}, this.innerText)" placeholder="タップして添削結果やメモを記入...">
                        ${post.correction || ""}
                    </div>
                </div>
                <div>
                    <button class="delete-btn" onclick="deletePost(${post.id})">削除する</button>
                </div>
            `;
            feed.appendChild(postEl);
        });
    }

    function goToAI(aiType, encodedText) {
        const text = decodeURIComponent(encodedText);
        
        if (aiType === 'gemini') {
            const geminiUrl = `https://gemini.google.com/app?prompt=${encodeURIComponent(text)}`;
            window.open(geminiUrl, "_blank");
        } else if (aiType === 'claude') {
            const claudeUrl = `https://claude.ai/new?q=${encodeURIComponent(text)}`;
            
            navigator.clipboard.writeText(text).then(() => {
                window.open(claudeUrl, "_blank");
            }).catch(() => {
                window.open(claudeUrl, "_blank");
            });
        }
    }

    function saveCorrection(postId, text) {
        let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        const index = posts.findIndex(p => p.id === postId);
        if (index !== -1) {
            posts[index].correction = text;
            localStorage.setItem("jp_sns_posts", JSON.stringify(posts));
        }
    }

    function deletePost(postId) {
        if(confirm("この日記を削除してもよろしいですか？")) {
            let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
            posts = posts.filter(p => p.id !== postId);
            localStorage.setItem("jp_sns_posts", JSON.stringify(posts));
            renderPosts();
        }
    }

    function exportJSON() {
        const posts = localStorage.getItem("jp_sns_posts") || "[]";
        const blob = new Blob([posts], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `diary_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function importJSON(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedPosts = JSON.parse(e.target.result);
                if (Array.isArray(importedPosts)) {
                    if (confirm("匯入備份會覆蓋目前手機內的日記紀錄，確定要繼續嗎？")) {
                        localStorage.setItem("jp_sns_posts", JSON.stringify(importedPosts));
                        renderPosts();
                        alert("還原日記成功！");
                    }
                } else {
                    alert("錯誤的檔案格式，無法還原。");
                }
            } catch (err) {
                alert("讀取檔案時發生錯誤。");
            }
        };
        reader.readAsText(file);
        input.value = ""; 
    }

    function exportCSV() {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        if (posts.length === 0) {
            alert("目前還沒有任何日記可以導出喔！");
            return;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "日期時間,天氣與地點,日記原文,添削・學習紀錄\n";

        posts.forEach(post => {
            const cleanContent = post.content.replace(/"/g, '""');
            const cleanCorrection = (post.correction || "").replace(/"/g, '""');
            const cleanWeather = (post.weather || "").replace(/"/g, '""');

            csvContent += `"${post.time}","${cleanWeather}","${cleanContent}","${cleanCorrection}"\n`;
        });

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `my_japanese_diary_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    UX-friendly escapeHtml helper
    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
    
    function loadPosts() {
        renderPosts();
    }
</script>

</body>
</html>
