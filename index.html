<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ひとりごと</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #FDF8F4;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #7e7e7e;
            --border-color: #E2E9F3;
            
            --color-lime: #D2E767;
            --color-mango: #FFA26D;
            --color-avatar-bg: #C0E0FF;
            
            --color-gemini: #1A73E8; 
            --color-claude: #D97756; 
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            padding-bottom: 60px;
            overflow-x: hidden;
        }
        
        /* 導覽列與側邊選單 */
        .header {
            font-family: 'Noto Serif JP', serif;
            font-weight: 700;
            position: sticky; top: 0;
            background: rgba(253, 248, 244, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--color-mango);
            padding: 16px;
            text-align: center;
            font-size: 20px;
            color: #4a4a4a;
            z-index: 90;
            letter-spacing: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-trigger {
            background: none; border: none; font-size: 22px; cursor: pointer; color: #4a4a4a; padding: 0 4px;
        }
        
        /* 側邊選單外殼 */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.08);
            z-index: 200; transition: right 0.3s ease;
            display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 190; display: none;
        }
        .sidebar-section {
            border-bottom: 1px dashed var(--border-color); padding-bottom: 16px; margin-bottom: 16px;
        }
        .sidebar-title { font-size: 13px; font-weight: 700; color: var(--text-color); margin-bottom: 10px; }
        
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 14px; }
        
        /* 按鈕風格 */
        .btn-base {
            font-family: inherit; border: none; border-radius: 20px; padding: 8px 18px;
            font-weight: 700; font-size: 13px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn-base:active { opacity: 0.8; }
        .draft-btn { background-color: #e9ecef; color: #495057; }
        .post-btn { background-color: var(--color-mango); color: white; box-shadow: 0 2px 6px rgba(255, 162, 109, 0.4); }

        /* 發文區 */
        .post-box {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 16px; margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(129, 165, 222, 0.08);
        }
        .post-box textarea {
            width: 100%; height: 100px; background: transparent; border: none;
            color: var(--text-color); font-size: 16px; resize: none; line-height: 1.6;
        }
        .post-box textarea:focus { outline: none; }
        .weather-status { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
        
        /* 搜尋欄位 */
        .search-input {
            width: 100%; font-family: inherit; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 8px 12px; font-size: 13px; outline: none; margin-bottom: 12px;
        }

        /* 動態牆 */
        .feed { display: flex; flex-direction: column; gap: 16px; }
        .post {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 16px; box-shadow: 0 4px 12px rgba(129, 165, 222, 0.05);
        }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%; background-color: var(--color-avatar-bg);
            margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .username { font-weight: 700; font-size: 15px; }
        .meta-info { font-size: 11px; color: var(--text-muted); display: flex; gap: 8px; margin-top: 2px; }
        
        .post-content {
            font-family: 'Noto Serif JP', serif; font-size: 16px; line-height: 1.75;
            white-space: pre-wrap; margin-bottom: 14px; color: #2c2c2c;
        }
        .edit-textarea {
            width: 100%; height: 90px; border: 1px solid var(--color-mango);
            border-radius: 12px; padding: 8px; font-family: inherit; font-size: 15px; resize: none; outline: none;
        }
        
        .post-action-bar { display: flex; gap: 12px; margin-top: 10px; font-size: 12px; color: var(--text-muted); }
        .action-link { cursor: pointer; font-weight: 500; }
        .action-link:hover { color: var(--color-mango); }

        .comment-style-toggle {
            font-family: inherit; font-size: 13px; color: #6d7a1c; background: #f4f6ec;
            border: none; border-radius: 12px; padding: 8px 14px; cursor: pointer; font-weight: 700; margin-top: 12px;
        }

        .interactive-panel { display: none; margin-top: 12px; border-top: 1px dashed var(--border-color); padding-top: 12px; }
        .ai-select-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .ai-mini-btn { flex: 1; padding: 8px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
        .ai-btn-gemini { background: #e8f0fe; color: var(--color-gemini); }
        .ai-btn-claude { background: #fdf2ee; color: var(--color-claude); }

        /* 留言區系統 */
        .comments-container { display: flex; flex-direction: column; gap: 10px; }
        .comment-node {
            background-color: #fafbfc; border-left: 4px solid var(--border-color);
            padding: 10px 12px; border-radius: 0 14px 14px 0; border: 1px solid #f0f2f5;
        }
        .comment-node.node-gemini { border-left: 4px solid var(--color-gemini); }
        .comment-node.node-claude { border-left: 4px solid var(--color-claude); }
        .comment-user-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .comment-avatar { width: 22px; height: 22px; border-radius: 50%; margin-right: 8px; }
        .avatar-gemini { background-color: var(--color-gemini); }
        .avatar-claude { background-color: var(--color-claude); }
        .comment-username { font-size: 12px; font-weight: 700; }
        .user-gemini { color: var(--color-gemini); }
        .user-claude { color: var(--color-claude); }
        
        .comment-content { font-size: 14px; color: #444; line-height: 1.6; white-space: pre-wrap; }
        .comment-textarea {
            width: 100%; height: 70px; border: 1px solid var(--border-color);
            border-radius: 10px; padding: 6px; font-size: 13px; resize: none; outline: none; font-family: inherit;
        }
    </style>
</head>
<body>

<div class="header">
    <div style="width:24px;"></div> <div>ひとりごと</div>
    <button class="menu-trigger" onclick="toggleSidebar(true)">三</button>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

<div class="sidebar" id="sidebar">
    <div style="text-align: right; margin-bottom: 10px;">
        <button class="menu-trigger" onclick="toggleSidebar(false)">×</button>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">検索（搜尋文章）</div>
        <input type="text" id="sidebarSearch" class="search-input" placeholder="キーワードを入力..." oninput="searchPosts(this.value)">
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">期間指定で統整（日期統整）</div>
        <input type="date" id="filterStart" class="search-input" style="margin-bottom:6px;">
        <input type="date" id="filterEnd" class="search-input" style="margin-bottom:10px;">
        <button class="btn-base post-btn" style="width:100%; font-size:12px; padding:6px;" onclick="generateSummary()">指定期間で統整</button>
        <div id="summaryBox" style="display:none; margin-top:10px; background:#f8f9fa; padding:10px; border-radius:10px; border:1px solid var(--border-color);">
            <div id="summaryContent" style="font-size:11px; white-space:pre-wrap; max-height:100px; overflow-y:auto; margin-bottom:6px; background:white; padding:6px; border-radius:6px;"></div>
            <button class="btn-base draft-btn" style="font-size:10px; padding:4px 8px; width:100%;" onclick="copySummary()">コピー（複製）</button>
        </div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">学習進捗（學習統計）</div>
        <div id="statsBox" style="font-size:12px; color:#555; line-height:1.6;">日記総数：0篇<br>AIフィードバック：0回</div>
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">設定（使用者設定）</div>
        <input type="text" id="settingsUsername" class="search-input" value="リカ" onchange="saveUserProfile()" placeholder="ユーザー名修改">
    </div>

    <div class="sidebar-section">
        <div class="sidebar-title">データ管理（備份）</div>
        <button class="btn-base draft-btn" style="width:100%; font-size:12px; padding:6px; margin-bottom:6px;" onclick="exportJSON()">日記をバックアップ (JSON)</button>
        <label class="btn-base draft-btn" style="display:block; text-align:center; font-size:12px; padding:6px; margin-bottom:6px;">
            バックアップを復元 (JSON)
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(this)">
        </label>
        <button class="btn-base draft-btn" style="width:100%; font-size:12px; padding:6px;" onclick="exportCSV()">Excel/CSVに出力</button>
    </div>

    <div class="sidebar-section" style="border:none; margin-top:auto; padding-top:20px; text-align:center; font-size:11px; color:var(--text-muted);">
        バージョン：v2.5.0<br>最終更新：2026/06/10
    </div>
</div>

<div class="container">
    <div id="draftArea" style="display:none; background:#f8f9fa; border:1px solid #e9ecef; border-radius:14px; padding:12px; margin-bottom:16px;">
        <div style="font-size:12px; font-weight:700; color:#6c757d; margin-bottom:6px;">下書き</div>
        <div id="draftContent" style="font-size:14px; color:#333; background:white; padding:10px; border-radius:8px; border:1px solid #dee2e6; cursor:pointer;" onclick="loadDraft()"></div>
    </div>

    <div class="post-box">
        <textarea id="postInput" placeholder="今日の日記を日本語で書いてみましょう！..." oninput="autoSaveDraft()"></textarea>
        <div id="weatherDisplay" class="weather-status">位置情報と天気を取得中...</div>
        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #f5f5f5; padding-top:12px; flex-wrap:wrap; gap:8px;">
            <div style="display:flex; align-items:center; gap:4px;">
                <span style="font-size:11px; color:var(--text-muted);">投稿日:</span>
                <input type="date" id="postTargetDate" style="font-family:inherit; border:1px solid var(--border-color); border-radius:8px; padding:4px; font-size:11px;">
            </div>
            <div style="display:flex; gap:6px;">
                <button class="btn-base draft-btn" onclick="manualSaveDraft()">下書き保存</button>
                <button class="btn-base post-btn" onclick="addPost()">投稿する</button>
            </div>
        </div>
    </div>

    <div id="postFeed" class="feed"></div>
</div>

<script>
    let USER_NAME = localStorage.getItem("diary_username") || "リカ";
    const USER_AVATAR = "🌷";
    let currentWeatherData = "位置情報オフ";

    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("postTargetDate").value = new Date().toISOString().split('T')[0];
        document.getElementById("settingsUsername").value = USER_NAME;
        renderPosts();
        checkDraft();
        getLiveWeatherAndLocation();
    });

    function toggleSidebar(open) {
        document.getElementById("sidebar").classList.toggle("open", open);
        document.getElementById("sidebarOverlay").style.display = open ? "block" : "none";
        if(open) updateStats();
    }

    function saveUserProfile() {
        const val = document.getElementById("settingsUsername").value.trim();
        if(val) { USER_NAME = val; localStorage.setItem("diary_username", val); renderPosts(); }
    }

    function updateStats() {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts") || "[]");
        let aiCount = 0;
        posts.forEach(p => { if(p.aiComments) aiCount += Object.keys(p.aiComments).length; });
        document.getElementById("statsBox").innerHTML = `日記総数：${posts.length} 篇<br>AIフィードバック：${aiCount} 回`;
    }

    function autoSaveDraft() { localStorage.setItem("jp_diary_draft", document.getElementById("postInput").value); }
    function manualSaveDraft() { const content = document.getElementById("postInput").value.trim(); if (!content) return; localStorage.setItem("jp_diary_draft", content); checkDraft(); alert("草稿已儲存！"); }
    function checkDraft() { const d = localStorage.getItem("jp_diary_draft"); const area = document.getElementById("draftArea"); if (d && d.trim()) { area.style.display = "block"; document.getElementById("draftContent").innerText = d.length > 25 ? d.substring(0, 25) + "..." : d; } else { area.style.display = "none"; } }
    function loadDraft() { document.getElementById("postInput").value = localStorage.getItem("jp_diary_draft"); }

    /* 編輯日記原文功能 */
    function editPost(postId) {
        const contentBox = document.getElementById(`content-${postId}`);
        const currentText = contentBox.innerText;
        contentBox.innerHTML = `
            <textarea id="textarea-${postId}" class="edit-textarea">${currentText}</textarea>
            <div style="display:flex; gap:6px; margin-top:8px; justify-content:flex-end;">
                <button class="btn-base draft-btn" style="padding:4px 10px; font-size:11px;" onclick="cancelEdit(${postId}, \`${encodeURIComponent(currentText)}\`)">キャンセル</button>
                <button class="btn-base post-btn" style="padding:4px 10px; font-size:11px;" onclick="saveEdit(${postId})">保存</button>
            </div>
        `;
    }
    function cancelEdit(postId, oldText) { document.getElementById(`content-${postId}`).innerText = decodeURIComponent(oldText); }
    function saveEdit(postId) {
        const newText = document.getElementById(`textarea-${postId}`).value.trim();
        if(!newText) return;
        let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        const idx = posts.findIndex(p => p.id === postId);
        if(idx !== -1) { posts[idx].content = newText; localStorage.setItem("jp_sns_posts", JSON.stringify(posts)); renderPosts(); }
    }

    function deletePost(postId) { if(confirm("確定要刪除這則日記嗎？")) { let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || []; posts = posts.filter(p => p.id !== postId); localStorage.setItem("jp_sns_posts", JSON.stringify(posts)); renderPosts(); } }

    function toggleInteractivePanel(postId) {
        const panel = document.getElementById(`panel-${postId}`);
        const btn = document.getElementById(`toggle-btn-${postId}`);
        const isBlock = panel.style.display === "block";
        panel.style.display = isBlock ? "none" : "block";
        btn.innerText = isBlock ? "添削・学習メモ" : "折りたたむ";
    }

    /* 處理 AI 留言與鎖定系統 */
    function requestAICorrection(aiType, postId, rawContent) {
        const container = document.getElementById(`comments-container-${postId}`);
        let node = document.getElementById(`comment-${aiType}-${postId}`);
        
        if (!node) {
            node = document.createElement("div");
            node.id = `comment-${aiType}-${postId}`;
            node.className = `comment-node node-${aiType}`;
            setupCommentEditing(node, postId, aiType, "");
        }
        container.insertBefore(node, container.firstChild);

        const promptText = `請幫我批改這段日文日記。請指出不自然的地方、文法錯誤，並提供修正建議與更道地的表達方式：\n\n「${decodeURIComponent(rawContent)}」`;
        navigator.clipboard.writeText(promptText).then(() => {
            alert("提示詞已自動複製！請在跳出的視窗中直接貼上送出。");
            window.open(aiType === 'gemini' ? "https://gemini.google.com/" : "https://claude.ai/", "_blank");
        }).catch(() => {
            window.open(aiType === 'gemini' ? "https://gemini.google.com/" : "https://claude.ai/", "_blank");
        });
    }

    function setupCommentEditing(node, postId, aiType, currentVal) {
        const label = aiType === 'gemini' ? 'Gemini' : 'Claude';
        node.innerHTML = `
            <div class="comment-user-bar">
                <div style="display:flex; align-items:center;">
                    <div class="comment-avatar avatar-${aiType}"></div>
                    <span class="comment-username user-${aiType}">${label}</span>
                </div>
            </div>
            <textarea id="textarea-${aiType}-${postId}" class="comment-textarea" placeholder="ここにAIの返信結果を貼り付け、返信ボタンで確定...">${currentVal}</textarea>
            <div style="display:flex; justify-content:flex-end; margin-top:6px;">
                <button class="btn-base post-btn" style="font-size:11px; padding:4px 10px;" onclick="lockComment(${postId}, '${aiType}')">返信</button>
            </div>
        `;
    }

    function lockComment(postId, aiType) {
        const text = document.getElementById(`textarea-${aiType}-${postId}`).value.trim();
        if(!text) return;
        
        let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        const idx = posts.findIndex(p => p.id === postId);
        if(idx !== -1) {
            if(!posts[idx].aiComments) posts[idx].aiComments = {};
            posts[idx].aiComments[aiType] = text;

            if(!posts[idx].commentOrder) posts[idx].commentOrder = [];
            posts[idx].commentOrder = posts[idx].commentOrder.filter(x => x !== aiType);
            posts[idx].commentOrder.unshift(aiType);

            localStorage.setItem("jp_sns_posts", JSON.stringify(posts));
            renderPosts();
        }
    }

    function unlockComment(postId, aiType, currentVal) {
        const node = document.getElementById(`comment-${aiType}-${postId}`);
        setupCommentEditing(node, postId, aiType, currentVal);
    }

    /* 搜尋文章邏輯 */
    function searchPosts(keyword) {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        const k = keyword.toLowerCase().trim();
        const feed = document.getElementById("postFeed");
        
        if(!k) { renderPosts(); return; }
        
        const filtered = posts.filter(p => p.content.toLowerCase().includes(k));
        renderFeedList(filtered);
    }

    /* 日期篩選與統整邏輯 */
    function generateSummary() {
        const start = document.getElementById("filterStart").value;
        const end = document.getElementById("filterEnd").value;
        if (!start || !end) { alert("請選擇完整的開始與結束日期。"); return; }
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        const startTime = new Date(start).setHours(0,0,0,0);
        const endTime = new Date(end).setHours(23,59,59,999);
        const filtered = posts.filter(p => p.id >= startTime && p.id <= endTime);

        const box = document.getElementById("summaryBox");
        const content = document.getElementById("summaryContent");
        if (filtered.length === 0) { content.innerText = "該期間內沒有任何日記紀錄。"; box.style.display = "block"; return; }

        let txt = `【指定期間日文日記統整報告】\n期間：${start} ~ ${end}\n\n`;
        filtered.forEach((p, idx) => {
            txt += `--- 篇章 ${idx + 1} (${p.time}) ---\n【原文】：\n${p.content}\n`;
            if (p.aiComments) {
                if (p.aiComments.gemini) txt += `【Gemini 學習筆記】:\n${p.aiComments.gemini}\n`;
                if (p.aiComments.claude) txt += `【Claude 學習筆記】:\n${p.aiComments.claude}\n`;
            }
            txt += `\n`;
        });
        content.innerText = txt; box.style.display = "block";
    }
    function copySummary() { navigator.clipboard.writeText(document.getElementById("summaryContent").innerText).then(() => alert("統整內容已複製！")); }

    function getLiveWeatherAndLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const weatherData = await weatherRes.json();
                const temp = Math.round(weatherData.current_weather.temperature);
                const weatherText = translateWeatherCode(weatherData.current_weather.weathercode);
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`);
                const geoData = await geoRes.json();
                const addr = geoData.address;
                const locationName = addr.city || addr.town || addr.suburb || "現在地";
                currentWeatherData = `${weatherText} ${temp}°C / ${locationName}`;
                document.getElementById("weatherDisplay").innerText = currentWeatherData;
            } catch (e) { document.getElementById("weatherDisplay").innerText = "位置情報オフ"; }
        }, () => { document.getElementById("weatherDisplay").innerText = "位置情報オフ"; });
    }

    function translateWeatherCode(code) {
        if (code === 0) return "晴れ";
        if ([1, 2, 3].includes(code)) return "晴れのちくもり";
        if ([45, 48].includes(code)) return "霧";
        if ([51, 53, 55, 61, 63, 65, 80, 81].includes(code)) return "雨";
        if ([71, 73, 75, 85, 86].includes(code)) return "雪";
        return "くもり";
    }

    function addPost() {
        const content = document.getElementById("postInput").value.trim();
        if (!content) return;
        const targetDateVal = document.getElementById("postTargetDate").value;
        const todayStr = new Date().toISOString().split('T')[0];
        
        let finalId = Date.now(); let timestamp = ""; let weatherInfo = currentWeatherData;

        if (targetDateVal === todayStr) {
            const now = new Date();
            timestamp = `${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        } else {
            const parts = targetDateVal.split('-');
            timestamp = `${parts[1]}/${parts[2]} 00:00`;
            const customDate = new Date(targetDateVal); customDate.setHours(23, 59, 59, 999);
            finalId = customDate.getTime(); weatherInfo = "過去の記録"; 
        }

        const post = { id: finalId, time: timestamp, weather: weatherInfo, content: content, aiComments: {}, commentOrder: [] };
        let posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        posts.push(post); posts.sort((a, b) => b.id - a.id);
        localStorage.setItem("jp_sns_posts", JSON.stringify(posts));

        localStorage.removeItem("jp_diary_draft");
        document.getElementById("postInput").value = "";
        document.getElementById("postTargetDate").value = todayStr;
        checkDraft(); renderPosts();
    }

    function renderPosts() {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        renderFeedList(posts);
    }

    function renderFeedList(posts) {
        const feed = document.getElementById("postFeed");
        feed.innerHTML = "";

        posts.forEach(post => {
            const postEl = document.createElement("div");
            postEl.className = "post";
            const weatherString = post.weather ? `<span>${escapeHtml(post.weather)}</span>` : "";
            const encodedContent = encodeURIComponent(post.content);

            let commentsHtml = "";
            const order = post.commentOrder || [];
            
            // 渲染已鎖定發布的留言 (無 Emoji，品牌色)
            order.forEach(aiType => {
                const val = post.aiComments ? (post.aiComments[aiType] || "") : "";
                if(!val) return;
                const label = aiType === 'gemini' ? 'Gemini' : 'Claude';
                commentsHtml += `
                    <div id="comment-${aiType}-${post.id}" class="comment-node node-${aiType}">
                        <div class="comment-user-bar">
                            <div style="display:flex; align-items:center;">
                                <div class="comment-avatar avatar-${aiType}"></div>
                                <span class="comment-username user-${aiType}">${label}</span>
                            </div>
                            <span class="action-link" style="font-size:11px;" onclick="unlockComment(${post.id}, '${aiType}', \`${encodeURIComponent(val)}\`)">編集</span>
                        </div>
                        <div class="comment-content">${escapeHtml(val).replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            });

            // 捕捉未記錄在排序中的舊資料
            ['gemini', 'claude'].forEach(aiType => {
                if (!order.includes(aiType) && post.aiComments && post.aiComments[aiType]) {
                    const val = post.aiComments[aiType];
                    const label = aiType === 'gemini' ? 'Gemini' : 'Claude';
                    commentsHtml = `
                        <div id="comment-${aiType}-${post.id}" class="comment-node node-${aiType}">
                            <div class="comment-user-bar">
                                <div style="display:flex; align-items:center;">
                                    <div class="comment-avatar avatar-${aiType}"></div>
                                    <span class="comment-username user-${aiType}">${label}</span>
                                </div>
                                <span class="action-link" style="font-size:11px;" onclick="unlockComment(${post.id}, '${aiType}', \`${encodeURIComponent(val)}\`)">編集</span>
                            </div>
                            <div class="comment-content">${escapeHtml(val).replace(/\n/g, '<br>')}</div>
                        </div>
                    ` + commentsHtml;
                }
            });

            postEl.innerHTML = `
                <div class="post-header">
                    <div class="avatar"><span>${escapeHtml(USER_AVATAR)}</span></div>
                    <div style="display:flex; flex-direction:column;">
                        <span class="username">${escapeHtml(USER_NAME)}</span>
                        <div class="meta-info"><span>${post.time}</span>${weatherString}</div>
                    </div>
                </div>
                <div class="post-content" id="content-${post.id}">${escapeHtml(post.content)}</div>
                
                <div class="post-action-bar">
                    <span class="action-link" onclick="editPost(${post.id})">編集する</span>
                    <span class="action-link" style="color:#ff5c5c;" onclick="deletePost(${post.id})">削除する</span>
                </div>

                <button id="toggle-btn-${post.id}" class="comment-style-toggle" onclick="toggleInteractivePanel(${post.id})">添削・学習メモ</button>

                <div id="panel-${post.id}" class="interactive-panel">
                    <div style="font-size:11px; color:var(--text-muted); font-weight:700; margin-bottom:6px;">どちらのAIに頼みますか？</div>
                    <div class="ai-select-row">
                        <button class="ai-mini-btn ai-btn-gemini" onclick="requestAICorrection('gemini', ${post.id}, '${encodedContent}')">Gemini</button>
                        <button class="ai-mini-btn ai-btn-claude" onclick="requestAICorrection('claude', ${post.id}, '${encodedContent}')">Claude</button>
                    </div>
                    <div id="comments-container-${post.id}" class="comments-container">
                        ${commentsHtml}
                    </div>
                </div>
            `;
            feed.appendChild(postEl);
        });
    }

    /* 備份系統與工具 */
    function exportJSON() {
        const posts = localStorage.getItem("jp_sns_posts") || "[]";
        const blob = new Blob([posts], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url;
        a.download = `diary_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }
    function importJSON(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if (confirm("匯入將會覆蓋目前的紀錄，確定繼續嗎？")) { localStorage.setItem("jp_sns_posts", JSON.stringify(imported)); renderPosts(); alert("還原日記成功！"); }
                } else { alert("檔案格式不符。"); }
            } catch (err) { alert("讀取檔案失敗。"); }
        };
        reader.readAsText(file); input.value = "";
    }
    function exportCSV() {
        const posts = JSON.parse(localStorage.getItem("jp_sns_posts")) || [];
        if (posts.length === 0) { alert("沒有日記紀錄可以導出。"); return; }
        let csv = "\uFEFF日期時間,天氣地點,日記原文\n";
        posts.forEach(p => { csv += `"${p.time}","${(p.weather || "")}","${p.content.replace(/"/g, '""')}"\n`; });
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url;
        a.download = `my_diary_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }
    function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
</script>

</body>
